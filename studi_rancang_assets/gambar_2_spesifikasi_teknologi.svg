<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <rect width="900" height="500" rx="15" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Title -->
  <text x="450" y="40" font-family="'Outfit', 'Inter', sans-serif" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">Spesifikasi Teknologi Aplikasi B-ONE</text>
  
  <!-- Client Side -->
  <g transform="translate(100, 100)">
    <rect width="300" height="340" rx="12" fill="#ffffff" stroke="#0284c7" stroke-width="2" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.05))"/>
    <rect width="300" height="50" rx="12" fill="#0284c7"/>
    <rect y="40" width="300" height="10" fill="#0284c7"/>
    <text x="150" y="32" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Client (Sisi Pengguna)</text>
    
    <text x="40" y="90" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Teknologi Frontend:</text>
    
    <circle cx="50" cy="130" r="10" fill="#38bdf8"/>
    <text x="70" y="134" font-family="sans-serif" font-size="13" fill="#1e293b">Web Browser (Chrome/Edge/Firefox)</text>
    
    <circle cx="50" cy="170" r="10" fill="#38bdf8"/>
    <text x="70" y="174" font-family="sans-serif" font-size="13" fill="#1e293b">Face-API.js (Face descriptor local)</text>
    
    <circle cx="50" cy="210" r="10" fill="#38bdf8"/>
    <text x="70" y="214" font-family="sans-serif" font-size="13" fill="#1e293b">Tailwind CSS (UI Framework)</text>
    
    <circle cx="50" cy="250" r="10" fill="#38bdf8"/>
    <text x="70" y="254" font-family="sans-serif" font-size="13" fill="#1e293b">Alpine.js / JS Vanilla</text>
    
    <text x="40" y="300" font-family="sans-serif" font-size="12" font-style="italic" fill="#64748b">Spesifikasi Minimum Hardware: Core i3, RAM 4GB,</text>
    <text x="40" y="320" font-family="sans-serif" font-size="12" font-style="italic" fill="#64748b">Webcam standar HD (720p)</text>
  </g>

  <!-- Server Side -->
  <g transform="translate(500, 100)">
    <rect width="300" height="340" rx="12" fill="#ffffff" stroke="#475569" stroke-width="2" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.05))"/>
    <rect width="300" height="50" rx="12" fill="#475569"/>
    <rect y="40" width="300" height="10" fill="#475569"/>
    <text x="150" y="32" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Server (Sisi Server)</text>
    
    <text x="40" y="90" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Teknologi Backend:</text>
    
    <circle cx="50" cy="130" r="10" fill="#94a3b8"/>
    <text x="70" y="134" font-family="sans-serif" font-size="13" fill="#1e293b">Laravel 11.x (MVC PHP Framework)</text>
    
    <circle cx="50" cy="170" r="10" fill="#94a3b8"/>
    <text x="70" y="174" font-family="sans-serif" font-size="13" fill="#1e293b">PHP 8.2+</text>
    
    <circle cx="50" cy="210" r="10" fill="#94a3b8"/>
    <text x="70" y="214" font-family="sans-serif" font-size="13" fill="#1e293b">MySQL / MariaDB Database</text>
    
    <circle cx="50" cy="250" r="10" fill="#94a3b8"/>
    <text x="70" y="254" font-family="sans-serif" font-size="13" fill="#1e293b">Laragon / XAMPP Localhost Server</text>
    
    <text x="40" y="300" font-family="sans-serif" font-size="12" font-style="italic" fill="#64748b">Spesifikasi Server: Windows/Linux OS,</text>
    <text x="40" y="320" font-family="sans-serif" font-size="12" font-style="italic" fill="#64748b">Database MySQL port 3306</text>
  </g>

  <!-- Flow Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>
  <line x1="410" y1="240" x2="490" y2="240" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="280" x2="410" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="225" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">HTTP Request</text>
  <text x="450" y="305" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">JSON Response</text>
</svg>