<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <rect width="900" height="500" rx="15" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Title -->
  <text x="450" y="40" font-family="'Outfit', 'Inter', sans-serif" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">Rancangan Arsitektur Aplikasi B-ONE</text>
  
  <!-- Left Side: Pengguna -->
  <g transform="translate(50, 150)">
    <rect width="180" height="200" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.05))"/>
    <!-- Icon Placeholder (User Avatar) -->
    <circle cx="90" cy="70" r="30" fill="#e0f2fe"/>
    <path d="M70 120 C70 100, 110 100, 110 120 Z" fill="#0284c7"/>
    <circle cx="90" cy="65" r="12" fill="#0284c7"/>
    
    <text x="90" y="140" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">Pengguna</text>
    <text x="90" y="165" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Pengunjung Layanan</text>
  </g>

  <!-- Middle: Kiosk Website -->
  <g transform="translate(320, 130)">
    <rect width="260" height="240" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="2" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.05))"/>
    <rect width="260" height="40" rx="10" fill="#0284c7"/>
    <rect y="30" width="260" height="10" fill="#0284c7"/> <!-- fix rounded bottom of header -->
    <text x="130" y="25" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Website Kiosk B-ONE</text>
    
    <!-- Website Features -->
    <text x="30" y="80" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0f172a">Fitur Kiosk:</text>
    <text x="30" y="110" font-family="sans-serif" font-size="13" fill="#334155">• Scan Wajah (Biometrik)</text>
    <text x="30" y="135" font-family="sans-serif" font-size="13" fill="#334155">• Registrasi Pengunjung</text>
    <text x="30" y="160" font-family="sans-serif" font-size="13" fill="#334155">• Pemilihan Jenis Layanan</text>
    <text x="30" y="185" font-family="sans-serif" font-size="13" fill="#334155">• Cetak Tiket QR &amp; Rating</text>
    
    <text x="130" y="220" font-family="sans-serif" font-size="11" font-style="italic" fill="#64748b" text-anchor="middle">http://localhost:8000</text>
  </g>

  <!-- Right: Database & Laravel Server -->
  <g transform="translate(670, 150)">
    <rect width="180" height="200" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.05))"/>
    
    <!-- DB Icon -->
    <path d="M90 40 C120 40, 135 45, 135 50 C135 55, 120 60, 90 60 C60 60, 45 55, 45 50 C45 45, 60 40, 90 40 Z" fill="#38bdf8"/>
    <path d="M45 50 L45 70 C45 75, 60 80, 90 80 C120 80, 135 75, 135 70 L135 50 Z" fill="#0284c7"/>
    <path d="M45 70 L45 90 C45 95, 60 100, 90 100 C120 100, 135 95, 135 90 L135 70 Z" fill="#0369a1"/>

    <text x="90" y="130" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1e293b" text-anchor="middle">Basis Data MySQL</text>
    <text x="90" y="155" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Data Pengunjung</text>
    <text x="90" y="175" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">&amp; Deskriptor Wajah</text>
  </g>

  <!-- Top Center: Admin Dashboard -->
  <g transform="translate(360, 410)">
    <rect width="180" height="70" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="90" y="28" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0f172a" text-anchor="middle">Admin Operator</text>
    <text x="90" y="48" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">Memanggil/Memproses Antrean</text>
  </g>

  <!-- Connectors -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>

  <!-- Pengguna -> Kiosk -->
  <line x1="230" y1="250" x2="310" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="270" y="235" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">akses</text>

  <!-- Kiosk -> DB -->
  <line x1="580" y1="250" x2="660" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="620" y="235" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">simpan/cocok</text>

  <!-- Admin Dashboard -> Kiosk/Service -->
  <line x1="450" y1="370" x2="450" y2="400" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>